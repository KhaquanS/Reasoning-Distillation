# Small mixed-dataset ReasonDistill example.
# Launch with:
# python scripts/train.py --config configs/hypothetical.yaml

experiment:
  name: reasondistill_mixture_example
  seed: 42

data:
  dataset: mixture
  # Fraction of Math500 examples in the Math500/MetaMathQA mixture.
  mix_ratio: 0.5
  max_samples: null
  cache_dir: ./cache

method:
  name: reasondistill
  sae_checkpoint: /path/to/sae.pt
  reason_score_path: /path/to/reasonscores.pt
  reasoning_neuron_count: 196

model:
  teacher: deepseek-ai/DeepSeek-R1-Distill-Llama-8B
  student: meta-llama/Llama-3.2-1B
  teacher_quantize_8bit: true
  student_checkpoint: null

alignment:
  teacher_align_layer: 19
  student_align_layer: 10
  target_norm: 64.0

training:
  batch_size: 2
  accum_steps: 16
  epochs: 2
  lr: 2.0e-5
  min_lr: 2.0e-6
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 1.0
  adam_betas: [0.9, 0.95]
  max_length: 256

loss:
  temperature: 4.0
  alpha_kd: 0.3
  alpha_align: 0.3
  beta_ce: 0.5

logging:
  checkpoint_dir: ./checkpoints_math
  log_dir: ./logs_math
  loss_log_entries_per_epoch: 1000
