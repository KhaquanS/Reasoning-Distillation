# Train ReasonDistill from the Qwen teacher into the Qwen math student.
# First train the SAE with configs/qwen_sae.yaml, then generate reason scores
# for that SAE and set method.reason_score_path below.
# Run:
#   python scripts/train.py --config configs/qwen_reasondistill.yaml

experiment:
  name: reasondistill_qwen
  seed: 42

data:
  dataset: amdeepseek
  max_samples: null
  cache_dir: ./cache

method:
  name: reasondistill
  sae_checkpoint: ./checkpoints/qwen_sae_layer14_16x/sae.pt
  reason_score_path: ./checkpoints/qwen_sae_layer14_16x/reasonscores.pt # replace after scoring SAE features
  reasoning_neuron_count: 196

model:
  teacher: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
  student: Qwen/Qwen2.5-Math-1.5B
  teacher_quantize_8bit: true
  student_checkpoint: null

alignment:
  # Teacher targets come from SAE features at teacher layer 14.
  teacher_align_layer: 14
  # Student layer 14 predicts the selected reasoning SAE features.
  student_align_layer: 14
  target_norm: 64.0
  reason_active_threshold: 0.0
  reason_presence_weight: 0.25
  reason_rank_weight: 0.10

training:
  max_length: 1024
  batch_size: 4
  accum_steps: 32
  epochs: 3

  lr: 2.0e-5
  min_lr: 2.0e-6
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_grad_norm: 1.0
  adam_betas: [0.9, 0.95]

loss:
  temperature: 4.0
  alpha_kd: 0.5
  alpha_align: 0.2
  beta_ce: 0.3

logging:
  checkpoint_dir: ./checkpoints/qwen_reasondistill
  log_dir: ./logs/qwen_reasondistill
  loss_log_entries_per_epoch: 100
