# Train a ReasonDistill-compatible Sparse Autoencoder on the Qwen teacher.
# Run:
#   python scripts/train_sae.py --config configs/qwen_sae.yaml

experiment:
  seed: 42

model:
  teacher_model_id: Qwen/Qwen3.5-4B
  # Zero-indexed teacher transformer layer used for SAE activations.
  layer: 16
  dtype: bfloat16
  attn_implementation: null

data:
  dataset: amdeepseek
  cache_dir: ./cache
  max_samples: 300_000
  max_length: 2048

sae:
  latent_dim: null
  expansion_factor: 16
  sparsity_coefficient: 5.0
  sparsity_warmup_fraction: 0.05

training:
  sequence_batch_size: 20
  token_batch_size: 131_000
  max_train_tokens: 500_000_000
  lr: 2.0e-5
  min_lr: 0.0
  lr_decay_fraction: 0.20
  weight_decay: 0.0
  adam_betas: [0.9, 0.999]
  max_grad_norm: 1.0
  num_workers: 0

logging:
  checkpoint_dir: ./checkpoints/qwen_sae_layer16_16x
  save_every_steps: 1000
  log_every_steps: 1000
  log_every_samples: 1000
  log_path: ./logs/qwen_sae_layer16_16x/sae_training_metrics.csv
  resume_from: null
