# Full AM-DeepSeek-R1-Distilled-1.4M training example.
# Launch with:
# python scripts/train.py --config configs/amdeepseek_full.yaml

experiment:
  name: reasondistill_amdeepseek_full
  seed: 42

data:
  # Loads a-m-team/AM-DeepSeek-R1-Distilled-1.4M through data_loaders/amdeepseek.py.
  dataset: amdeepseek
  # Keep null for the full 1.4M-example dataset. Set a small integer for smoke tests.
  max_samples: null
  cache_dir: ./cache

method:
  # Options in scripts/train.py: logit_kd, fitnets, hard_label, reasondistill.
  name: reasondistill
  sae_checkpoint: /path/to/sae.pt # ADD CHECKPOINT HERE FROM EPOCH 5 OF OUR INITIAL RUN
  reason_score_path: /path/to/reasonscores.pt # ADD CHECKPOINT HERE FROM EPOCH 5 OF OUR INITIAL RUN
  reasoning_neuron_count: 196

model:
  teacher: deepseek-ai/DeepSeek-R1-Distill-Llama-8B
  student: meta-llama/Llama-3.2-1B
  teacher_quantize_8bit: true
  student_checkpoint: null # ADD CHECKPOINT HERE FROM EPOCH 5 OF OUR INITIAL RUN

alignment:
  # Layers used by FitNets and ReasonDistill for hidden-state alignment.
  teacher_align_layer: 19
  student_align_layer: 10
  target_norm: 64.0

training:
  epochs: 5
  batch_size: 2
  accum_steps: 16
  max_length: 256

  lr: 1.0e-5
  min_lr: 1.0e-6
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  adam_betas: [0.9, 0.95]

loss:
  temperature: 4.0
  alpha_kd: 0.5
  alpha_align: 0.5
  beta_ce: 0.5

logging:
  checkpoint_dir: ./checkpoints/amdeepseek_full
  log_dir: ./logs/amdeepseek_full
  loss_log_entries_per_epoch: 100 # number of enteries into the csv file for each epoch
