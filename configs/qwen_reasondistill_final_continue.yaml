# Continue ReasonDistill training from configs/qwen_reasondistill_final.yaml's
# final checkpoint, on 10,000 NEW samples (samples[40_000:50_000]).
#
# Key changes to break the ~1.0 loss plateau:
# 1. Increased min_lr (4e-6 → 1e-5) to prevent LR from decaying too far
# 2. Higher max_grad_norm (0.7 → 1.0) to allow larger gradient steps
# 3. Slightly higher LR (2e-5 → 2.5e-5) for more aggressive exploration
# 4. Increased alpha_align (0.1 → 0.15) to emphasize reasoning alignment
# 5. Slightly reduced beta_ce (0.9 → 0.85) to let KD/alignment guide more
#
# Total opt steps: ceil(10_000 / 128) = 79
# LR cycles: ~2 full cycles (matching original density)
#
# Run:
#   python scripts/train.py --config configs/qwen_reasondistill_final_continue.yaml

experiment:
  name: reasondistill_qwen_final_continue
  seed: 42

data:
  dataset: amdeepseek
  max_samples: 10_000
  skip_samples: 40_000   # Train on samples[40_000:50_000] -- fresh data, not a repeat
  cache_dir: ./cache

method:
  name: reasondistill
  sae_checkpoint: hf://Khaquan/qwen-khaquanS-distillations/qwen-3.5-4B-L16_16x-SAE/sae.pt
  reason_score_path: hf://Khaquan/qwen-khaquanS-distillations/qwen-3.5-4B-L16_16x-SAE/reasonscore.pt
  reasoning_neuron_count: 512

model:
  teacher: Qwen/Qwen3.5-4B
  student: Qwen/Qwen3.5-2B
  teacher_quantize_8bit: true
  student_checkpoint: Khaquan/qwen-khaquanS-distillations/qwen_reasondistill_final/epoch_1   # Load from HF

alignment:
  teacher_align_layer: 16
  student_align_layer: 12
  target_norm: 64.0
  reason_active_threshold: 0.0
  reason_presence_weight: 0.25
  reason_rank_weight: 0.10

training:
  max_length: 2048
  batch_size: 1
  accum_steps: 128
  epochs: 1

  lr: 2.5e-5                        # Slightly higher peak to escape plateau
  min_lr: 1.0e-5                    # RAISED: prevents LR from decaying too low, keeping optimizer active
  warmup_ratio: 0.05                # ~4-step warmup for smooth start
  weight_decay: 0.01
  max_grad_norm: 1.0                # RAISED: allow larger updates to escape local minima
  adam_betas: [0.9, 0.98]

  scheduler_type: cosine_restarts
  restart_interval_steps: 39        # Same density: ~2 cycles over 79 steps
  restart_mult: 1                   # Keep constant period

loss:
  temperature: 4.0
  alpha_kd: 0.3                     # Unchanged: KD still useful
  alpha_align: 0.15                 # RAISED: stronger reasoning alignment to break plateau
  beta_ce: 0.85                     # LOWERED: slightly reduce task loss dominance

logging:
  checkpoint_dir: ./checkpoints/qwen_reasondistill_final_continue
  log_dir: ./logs/qwen_reasondistill_final_continue
  loss_log_entries_per_epoch: 50
  save_every_n_steps: 25            # 3 checkpoints: at steps 25, 50, 79