# Continue ReasonDistill training - AGGRESSIVE PLATEAU BREAKER
#
# Total opt steps: ceil(15_000 / 128) = 94
# 
# Key changes to break the ~1.0 loss plateau:
# 1. Higher min_lr (1.5e-5) keeps optimizer active through troughs
# 2. Higher max_grad_norm (1.2) allows larger gradient steps
# 3. Increased alpha_align (0.25) forces reasoning alignment
# 4. Reduced beta_ce (0.75) lets KD/alignment guide more
# 5. Higher LR (3e-5) for aggressive exploration
#
# Run:
#   python scripts/train.py --config configs/qwen_reasondistill_final_continue.yaml

experiment:
  name: reasondistill_qwen_final_continue
  seed: 42

data:
  dataset: amdeepseek
  max_samples: 12_032
  skip_samples: 40_000
  cache_dir: ./cache

method:
  name: reasondistill
  sae_checkpoint: hf://Khaquan/qwen-khaquanS-distillations/qwen-3.5-4B-L16_16x-SAE/sae.pt
  reason_score_path: hf://Khaquan/qwen-khaquanS-distillations/qwen-3.5-4B-L16_16x-SAE/reasonscore.pt
  reasoning_neuron_count: 512

model:
  teacher: Qwen/Qwen3.5-4B
  student: Qwen/Qwen3.5-2B
  teacher_quantize_8bit: true
  student_checkpoint: hf://Khaquan/qwen-khaquanS-distillations/qwen_reasondistill_final/epoch_1

alignment:
  teacher_align_layer: 16
  student_align_layer: 12
  target_norm: 64.0
  reason_active_threshold: 0.0
  reason_presence_weight: 0.30     # INCREASED: stronger reasoning presence
  reason_rank_weight: 0.15         # INCREASED: prioritize top reasoning features

training:
  max_length: 2048
  batch_size: 1
  accum_steps: 128
  epochs: 1

  lr: 3.0e-5                       # INCREASED: more aggressive
  min_lr: 1.5e-5                   # INCREASED: keeps optimizer active
  warmup_ratio: 0.04               # Slightly shorter warmup
  weight_decay: 0.015              # Slightly higher regularization
  max_grad_norm: 1.2               # INCREASED: allow larger updates
  adam_betas: [0.9, 0.98]

  scheduler_type: cosine_restarts
  restart_interval_steps: 31
  restart_mult: 1

loss:
  temperature: 4.0
  alpha_kd: 0.30                   # Unchanged
  alpha_align: 0.25                # INCREASED: stronger reasoning alignment
  beta_ce: 0.75                    # DECREASED: reduce task loss dominance

logging:
  checkpoint_dir: ./checkpoints/qwen_reasondistill_final_continue
  log_dir: ./logs/qwen_reasondistill_final_continue
  loss_log_entries_per_epoch: 17
  save_every_n_steps: 45