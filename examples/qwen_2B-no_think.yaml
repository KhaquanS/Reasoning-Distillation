# Example evaluation configuration for Qwen models

models:
  - name: qwen-3.5-2b
    checkpoint: Qwen/Qwen3.5-2B
    trust_remote_code: true
    dtype: bfloat16
    device_map: auto
    enable_thinking: false  

  - name: qwen-3.5-2b-reasondistill-step_20
    checkpoint: qwen_reasondistill/step_20
    trust_remote_code: true
    dtype: bfloat16
    device_map: auto
    enable_thinking: false

  - name: qwen-3.5-2b-reasondistill-step_40
    checkpoint: qwen_reasondistill/step_40
    trust_remote_code: true
    dtype: bfloat16
    device_map: auto
    enable_thinking: false

  - name: qwen-3.5-2b-reasondistill-step_60
    checkpoint: qwen_reasondistill/step_60
    trust_remote_code: true
    dtype: bfloat16
    device_map: auto
    enable_thinking: false

  - name: qwen-3.5-2b-reasondistill-step_80
    checkpoint: qwen_reasondistill/step_80
    trust_remote_code: true
    dtype: bfloat16
    device_map: auto
    enable_thinking: false


benchmarks:
  - gsm8k
  - mmlu
  - arc-c
  - hellaswag

output_dir: ./eval_outputs
cache_dir: ./cache
split: test
max_samples: 1000
seed: 42

# Generation parameters following Qwen best practices
generation:
  max_new_tokens: 2048  # Qwen recommends 32,768 for most queries
  temperature: 1.0
  top_p: 0.95
  top_k: 20
  presence_penalty: 1.5
  repetition_penalty: 1.0
  batch_size: 4

# Benchmark-specific options
benchmark_options:
  mmlu:
    subject: all  
    max_new_tokens: 4096
  gpqa:
    subset: gpqa_diamond
    max_new_tokens: 1024
  arc-c:
    max_new_tokens: 1024
  hellaswag:
    max_new_tokens: 1024
    split: validation

